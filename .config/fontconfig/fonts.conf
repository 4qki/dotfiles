<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<alias>
		<family>serif</family>
		<prefer>
			<family>Libertinus Serif</family>
			<family>Linux Libertine</family>
			<family>Noto Serif</family>
			<family>Noto Color Emoji</family>
			<family>Noto Sans Symbols</family>
			<family>Symbols Nerd Font</family>
			<family>Joy Pixels</family>
			<family>Unifont</family>
		</prefer>
	</alias>

	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Adwaita Sans</family>
			<family>Libertinus Sans</family>
			<family>Noto Color Emoji</family>
			<family>Noto Sans Symbols</family>
			<family>Symbols Nerd Font</family>
			<family>Joy Pixels</family>
			<family>FontAwesome</family>
			<family>Unifont</family>
		</prefer>
	</alias>

	<alias>
		<family>sans</family>
		<prefer>
			<family>Adwaita Sans</family>
			<family>Libertinus Sans</family>
			<family>Linux Biolinum</family>
			<family>Noto Color Emoji</family>
			<family>Noto Sans Symbols</family>
			<family>Symbols Nerd Font</family>
			<family>Joy Pixels</family>
			<family>FontAwesome</family>
			<family>Unifont</family>
		</prefer>
	</alias>

	<alias>
	<family>monospace</family>
	<prefer>
	<family>Iosevka Nerd Font</family>
	<family>BlexMono Nerd Font</family>
	<family>JetBrainsMono Nerd Font</family>
	<family>Noto Color Emoji</family>
	<family>Noto Sans Symbols</family>
	<family>FontAwesome</family>
	<family>Joy Pixels</family>
	</prefer>
	</alias>
</fontconfig>
